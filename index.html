<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Binh's Coaching Corner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root{
  --paper:#FFF9EE; --paper2:#FFF3D9; --ink:#3B2B4F; --ink-dim:#8a7ba3;
  --sun:#FFD23F; --bubble:#FF70A6; --sky:#4CC9F0; --grass:#6EDB8F; --grape:#9B5DE5;
  --out:3px solid #3B2B4F; --pop:0 5px 0 #3B2B4F;
  --grad:linear-gradient(100deg,#FFD23F,#FF9770);
  --r:20px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#6f2020;color:var(--ink);
  font-family:'Nunito',sans-serif;font-size:14.5px;font-weight:600}
h1,h2,h3,.sg{font-family:'Fredoka',sans-serif}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,textarea,select{font:inherit;color:var(--ink)}
:focus-visible{outline:3px solid var(--sky);outline-offset:2px}

#stage{position:fixed;inset:0;touch-action:none}
#stage canvas{display:block}
#stage.cursor-hand{cursor:grab}
#stage.cursor-grabbing{cursor:grabbing}
#stage.cursor-draw{cursor:crosshair}

/* ---------- top bar ---------- */
#topbar{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;gap:10px;
  padding:calc(10px + env(safe-area-inset-top)) 14px 10px;pointer-events:none;z-index:30}
#brand{pointer-events:auto;display:flex;align-items:center;gap:9px;padding:8px 16px 8px 10px;
  border-radius:999px;background:var(--paper);border:var(--out);box-shadow:var(--pop)}
#logo{width:34px;height:31px;object-fit:contain}
#brand b{font:600 15px 'Fredoka';letter-spacing:.2px}
#brand span{color:var(--ink-dim);font-size:12px;display:none}
@media(min-width:560px){#brand span{display:inline}}
#topbtns{margin-left:auto;display:flex;gap:8px;pointer-events:auto}
.iconbtn{width:44px;height:44px;border-radius:15px;background:var(--paper);border:var(--out);
  display:grid;place-items:center;color:var(--ink);transition:.12s;box-shadow:var(--pop)}
.iconbtn:active{transform:translateY(4px);box-shadow:0 1px 0 #3B2B4F}
.iconbtn.accent{background:var(--grad)}
.iconbtn svg{width:19px;height:19px;fill:none;stroke:currentColor;stroke-width:2.4;
  stroke-linecap:round;stroke-linejoin:round}

/* ---------- dock ---------- */
#dock{position:fixed;left:50%;transform:translateX(-50%);
  bottom:calc(12px + env(safe-area-inset-bottom));z-index:34;
  display:flex;gap:4px;padding:5px;border-radius:19px;
  background:var(--paper);border:var(--out);box-shadow:var(--pop);
  transition:.25s cubic-bezier(.32,.72,.24,1)}
#dock button{width:42px;height:42px;border-radius:13px;display:grid;place-items:center;
  transition:.12s;border:2.5px solid transparent}
#dock .ico{font-size:20px;line-height:1;transition:.15s}
#dock button[aria-pressed="true"]{background:var(--sun);border-color:#3B2B4F}
#dock button[aria-pressed="true"] .ico{transform:scale(1.15) rotate(-6deg)}
#dock button:active .ico{transform:scale(.85)}
@media(max-width:899px){body.sheet-open #dock{bottom:calc(min(46vh,420px) + 12px)}}
@media(min-width:900px){#dock{left:auto;right:16px;transform:none;bottom:auto;
  top:78px;flex-direction:column;border-radius:17px}
  body.sheet-open #dock{right:372px}}

/* ---------- sheet ---------- */
#sheet{position:fixed;z-index:32;background:var(--paper);border:var(--out);
  box-shadow:var(--pop);display:flex;flex-direction:column;
  transition:transform .28s cubic-bezier(.32,.72,.24,1)}
@media(max-width:899px){
  #sheet{left:8px;right:8px;bottom:0;border-radius:24px 24px 0 0;max-height:46vh;
    border-bottom:none;transform:translateY(110%);padding-bottom:env(safe-area-inset-bottom)}
  body.sheet-open #sheet{transform:translateY(0)}
  #grab{width:48px;height:6px;border-radius:3px;background:#e5d9bd;margin:8px auto 0}
}
@media(min-width:900px){
  #sheet{top:78px;right:88px;width:280px;max-height:72vh;border-radius:22px;
    transform:translateX(16px) scale(.97);opacity:0;pointer-events:none;transition:.18s}
  body.sheet-open #sheet{transform:none;opacity:1;pointer-events:auto}
  #grab{display:none}
}
#panes{flex:1;overflow-y:auto;padding:12px 13px 15px;overscroll-behavior:contain}
.pane{display:none}.pane.on{display:block}
.sec{margin-bottom:12px}
.sec h3{font:500 12px 'Fredoka';letter-spacing:.06em;text-transform:uppercase;
  color:var(--grape);margin-bottom:7px}
.pickrow{display:flex;gap:8px}
.pick{flex:1;display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:16px;
  background:#fff;border:2.5px solid #3B2B4F;font-size:13px;cursor:pointer}
.pick input[type=color]{width:34px;height:34px;border:none;padding:0;background:none;
  border-radius:10px;cursor:pointer;flex-shrink:0}
.pick input[type=color]::-webkit-color-swatch{border-radius:10px;border:2.5px solid #3B2B4F}
.pick input[type=color]::-webkit-color-swatch-wrapper{padding:0}

/* ---------- buttons ---------- */
.bigbtn{width:100%;padding:11px;border-radius:16px;background:var(--grad);color:var(--ink);
  font:600 15px 'Fredoka';display:flex;align-items:center;justify-content:center;gap:8px;
  border:var(--out);box-shadow:var(--pop);transition:.12s}
.bigbtn:disabled{background:#EDE4CF;color:var(--ink-dim);box-shadow:none;cursor:not-allowed}
.bigbtn:not(:disabled):active{transform:translateY(4px);box-shadow:0 1px 0 #3B2B4F}
.ghost{width:100%;padding:9px;border-radius:14px;border:2.5px solid #3B2B4F;
  background:#fff;font-weight:700;font-size:13px;transition:.12s;box-shadow:0 3px 0 #3B2B4F}
.ghost:active{transform:translateY(3px);box-shadow:none}
.row{display:flex;gap:8px}
.row>*{flex:1}

/* ---------- player cards ---------- */
.plist{display:flex;flex-direction:column;gap:7px;margin-top:9px}
.pcard{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:16px;
  background:#fff;border:2.5px solid #3B2B4F;transition:.12s}
.pcard.sel{background:#FFF1B8;box-shadow:0 3px 0 #3B2B4F}
.pcard .num{width:29px;height:29px;border-radius:50%;display:grid;place-items:center;
  font:600 13px 'Fredoka';color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.35);
  border:2.5px solid #3B2B4F;flex-shrink:0;cursor:pointer}
.pcard .av{font-size:22px;width:38px;height:38px;border-radius:12px;
  background:var(--paper2);border:2.5px solid #3B2B4F;display:grid;place-items:center;transition:.12s}
.pcard .av:active{transform:scale(.88) rotate(-8deg)}
.pcard .nm{flex:1;font-weight:800;font-size:13px;text-transform:capitalize;cursor:pointer}
.pcard input[type=color]{width:30px;height:30px;border:none;padding:0;background:none;
  border-radius:9px;cursor:pointer}
.pcard input[type=color]::-webkit-color-swatch{border-radius:9px;border:2.5px solid #3B2B4F}
.pcard input[type=color]::-webkit-color-swatch-wrapper{padding:0}
.pcard .del{color:var(--ink-dim);padding:4px 6px;font-weight:800}
.pcard .del:hover{color:var(--bubble)}

/* ---------- swatches & tools ---------- */
.tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.tile{aspect-ratio:1;border-radius:15px;background:#fff;border:2.5px solid #3B2B4F;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  font-size:22px;transition:.12s}
.tile small{font:500 8.5px 'Fredoka';color:var(--ink-dim);text-align:center;line-height:1.1}
.tile[aria-pressed="true"]{background:var(--sun);box-shadow:0 3px 0 #3B2B4F;transform:translateY(-2px)}
.tile:active{transform:scale(.92)}
.nmedit{flex:1;min-width:0;font:800 13px Nunito;padding:4px 8px;border-radius:9px;
  border:2.5px solid #3B2B4F;background:#FFF1B8}
.swatches{display:flex;flex-wrap:wrap;gap:9px}
.sw{width:38px;height:38px;border-radius:13px;border:2.5px solid #3B2B4F;
  position:relative;transition:.12s}
.sw[aria-pressed="true"]{box-shadow:0 3px 0 #3B2B4F;transform:translateY(-2px)}
.sw[aria-pressed="true"]::after{content:'✓';position:absolute;inset:0;display:grid;
  place-items:center;color:#fff;font-weight:900;text-shadow:0 1px 3px rgba(0,0,0,.55)}
.sw input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.wbtn{flex:1;height:42px;border-radius:13px;background:#fff;border:2.5px solid #3B2B4F;
  display:grid;place-items:center;transition:.12s}
.wbtn i{display:block;border-radius:50%;background:var(--ink)}
.wbtn[aria-pressed="true"]{background:var(--sun);box-shadow:0 3px 0 #3B2B4F;transform:translateY(-2px)}
.toolrow{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.tool{padding:9px 2px;border-radius:14px;background:#fff;border:2.5px solid #3B2B4F;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  font:500 10.5px 'Fredoka';color:var(--ink);transition:.12s}
.tool svg{width:20px;height:20px;stroke:var(--ink);stroke-width:2;fill:none;
  stroke-linecap:round;stroke-linejoin:round}
.tool[aria-pressed="true"]{background:var(--sun);box-shadow:0 3px 0 #3B2B4F;transform:translateY(-2px)}

textarea{width:100%;min-height:76px;padding:11px;border-radius:14px;resize:vertical;
  background:#fff;border:2.5px solid #3B2B4F;font-weight:600}
textarea::placeholder{color:var(--ink-dim)}

/* ---------- presets & pins ---------- */
.presets{display:flex;flex-direction:column;gap:7px}
.preset{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:16px;
  background:#fff;border:2.5px solid #3B2B4F;cursor:pointer;transition:.12s;text-align:left;width:100%}
.preset:active{transform:translateY(2px)}
.preset .info{flex:1;min-width:0}
.preset .info b{display:block;font:500 13.5px 'Fredoka';white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis}
.preset .info span{font-size:11px;color:var(--ink-dim)}
.preset .chip{font:500 11px 'Fredoka';padding:4px 9px;border-radius:999px;
  background:var(--sky);color:#fff;border:2px solid #3B2B4F;flex-shrink:0}
.preset .mini{color:var(--ink-dim);padding:5px;flex-shrink:0;font-weight:800}
.preset .mini:hover{color:var(--bubble)}
.empty{padding:20px 10px;text-align:center;color:var(--ink-dim);font-size:13px}

/* ---------- draw pill ---------- */
#drawpill{position:fixed;top:calc(70px + env(safe-area-inset-top));left:50%;
  transform:translateX(-50%);z-index:29;display:none;align-items:center;gap:9px;
  padding:7px 9px 7px 16px;border-radius:999px;background:var(--paper);
  border:var(--out);box-shadow:var(--pop);font-size:12.5px;color:var(--ink-dim)}
#drawpill b{color:var(--grape);font-family:'Fredoka'}
#drawpill button{width:28px;height:28px;border-radius:50%;background:var(--sun);
  border:2px solid #3B2B4F;display:grid;place-items:center;font-size:12px;font-weight:800}
body.drawing #drawpill{display:flex}

/* ---------- popovers ---------- */
.pop{position:fixed;z-index:40;background:var(--paper);border:var(--out);
  border-radius:22px;box-shadow:var(--pop);padding:16px;display:none;max-width:min(92vw,340px)}
.pop.on{display:block;animation:popin .22s cubic-bezier(.3,1.6,.6,1)}
@keyframes popin{from{opacity:0;transform:scale(.85) translateY(10px)}to{opacity:1}}
.pop h2{font:500 17px 'Fredoka';margin-bottom:12px}
.pop .x{position:absolute;top:10px;right:10px;width:32px;height:32px;border-radius:50%;
  background:#fff;border:2.5px solid #3B2B4F;display:grid;place-items:center;font-weight:800}
#noteedit textarea{min-height:80px}
#noteedit .row{margin-top:10px}
#scrim{position:fixed;inset:0;z-index:39;display:none;background:rgba(59,43,79,.25)}
#scrim.on{display:block}

/* ---------- toast ---------- */
#toast{position:fixed;left:50%;transform:translateX(-50%) translateY(14px);
  bottom:calc(96px + env(safe-area-inset-bottom));z-index:50;padding:10px 20px;
  border-radius:999px;background:var(--paper);border:var(--out);box-shadow:var(--pop);
  font:700 13.5px Nunito;opacity:0;pointer-events:none;
  transition:.22s;display:flex;gap:12px;align-items:center}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
#toast button{color:var(--grape);font-weight:800}
@media(min-width:900px){#toast{bottom:26px}}

.hint{font-size:11.5px;color:var(--ink-dim);line-height:1.5;margin-top:8px;font-weight:600}
#site{position:fixed;right:12px;bottom:calc(10px + env(safe-area-inset-bottom));z-index:28;
  padding:6px 13px;border-radius:999px;background:var(--paper);border:2.5px solid #3B2B4F;
  box-shadow:0 3px 0 #3B2B4F;font:500 12px 'Fredoka';color:var(--grape);text-decoration:none}
#site:active{transform:translateY(2px);box-shadow:none}
@media(max-width:600px){#site{bottom:auto;top:calc(64px + env(safe-area-inset-top))}}
.sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}
@media(prefers-reduced-motion:reduce){*{transition-duration:.01ms!important;animation-duration:.01ms!important}}
</style>
</head>

<nav id="dock" aria-label="Functions">
  <button data-pane="players" aria-pressed="false" aria-label="Players"><span class="ico">🐶</span></button>
  <button data-pane="style" aria-pressed="false" aria-label="Court colours"><span class="ico">🎨</span></button>

  <div id="grab"></div>
  <div id="panes">

    <section class="pane on" data-p="players">
      <button class="bigbtn" id="btnAdd">＋ Add player <span id="cap" class="sg">0/6</span></button>
      <div class="plist" id="plist"></div>

    <section class="pane" data-p="draw">
      <div class="sec"><h3>Tool</h3>
        <div class="toolrow" id="tools">
          <button class="tool" data-tool="arrow" aria-pressed="false">
            <svg viewBox="0 0 24 24"><path d="M4 20 18 6M18 6h-6M18 6v6"/></svg>Arrow</button>
          <button class="tool" data-tool="line" aria-pressed="false">
            <svg viewBox="0 0 24 24"><path d="M4 20C8 16 10 8 20 4"/></svg>Line</button>
          <button class="tool" data-tool="pin" aria-pressed="false">
            <svg viewBox="0 0 24 24"><path d="M12 21s7-6.1 7-11a7 7 0 1 0-14 0c0 4.9 7 11 7 11z"/><circle cx="12" cy="10" r="2.4"/></svg>Note pin</button>
          <button class="tool" data-tool="erase" aria-pressed="false">
            <svg viewBox="0 0 24 24"><path d="m9 20 -5-5 9-11 7 6-8 10z"/><path d="M9 20h11"/></svg>Erase</button>
        </div></div>
      <div class="sec"><h3>Colour · Width</h3>
        <div class="swatches" id="scolors" style="margin-bottom:8px"></div>
        <div class="row" id="swidths">
          <button class="wbtn" data-w="0.02"  aria-pressed="false" aria-label="Extra thin"><i style="width:5px;height:5px"></i></button>
          <button class="wbtn" data-w="0.035" aria-pressed="true"  aria-label="Thin"><i style="width:8px;height:8px"></i></button>
          <button class="wbtn" data-w="0.05"  aria-pressed="false" aria-label="Medium"><i style="width:12px;height:12px"></i></button>
          <button class="wbtn" data-w="0.07"  aria-pressed="false" aria-label="Thick"><i style="width:16px;height:16px"></i></button>
          <button class="wbtn" data-w="0.095" aria-pressed="false" aria-label="Extra thick"><i style="width:21px;height:21px"></i></button>
        </div></div>
      <div class="row">
        <button class="ghost" id="btnUndoDraw">Undo last</button>
        <button class="ghost" id="btnClearDraw">Remove all</button>
      </div>
    </section>

    <section class="pane" data-p="style">
      <div class="sec"><h3>Colours</h3>
        <div class="pickrow" style="margin-bottom:8px">
          <label class="pick"><input type="color" id="colCourt" value="#90B489">Court</label>
          <label class="pick"><input type="color" id="colEnv" value="#9B2D2D">Surroundings</label>
        </div>
      </div>
    </section>

    <section class="pane" data-p="presets">
      <button class="bigbtn" id="btnSave2">Save current setup</button>
      <div class="row" style="margin-top:8px">
        <button class="ghost" id="btnImport">Import .json</button>
        <input type="file" id="fileImport" accept=".json" class="sr">
      </div>
      <div class="presets" id="presetList" style="margin-top:12px"></div>
    </section>

    <section class="pane" data-p="notes">
      <div class="sec"><h3>Setup notes</h3>
        <textarea id="setupNotes" placeholder="Drill instructions, rotation rules, focus points… Saved with every preset."></textarea></div>
      <div class="sec"><h3>Pinned notes</h3>
        <button class="bigbtn" id="btnAddPin" style="margin-bottom:10px">＋ Add pinned note</button>
        <div id="pinList" class="presets"><div class="empty">No pins yet — add one here or use the Note pin tool in Draw.</div></div></div>
    </section>

  </div>
</aside>

<a id="site" href="https://badminton4kids.com" target="_blank" rel="noopener">badminton4kids.com</a>
<div id="scrim"></div>
<div id="toast" role="status"><span id="toastMsg"></span><button id="toastAct" hidden></button></div>
<div class="sr" aria-live="polite" id="live"></div>

<script>
/* ================================================================
   Binh Coaching Corner — v1
   Single-file 3D badminton coaching board. Three.js r128.
   ================================================================ */
'use strict';
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const live=m=>{$('#live').textContent=m};
const REDUCED=matchMedia('(prefers-reduced-motion:reduce)').matches;

/* ---------- toast ---------- */
let toastT=null,toastFn=null;
function toast(msg,actLabel,fn){
  $('#toastMsg').textContent=msg; const b=$('#toastAct');
  if(actLabel){b.hidden=false;b.textContent=actLabel;toastFn=fn}else{b.hidden=true;toastFn=null}
  $('#toast').classList.add('on'); live(msg);
  clearTimeout(toastT); toastT=setTimeout(()=>$('#toast').classList.remove('on'),3200);
}
$('#toastAct').onclick=()=>{if(toastFn)toastFn();$('#toast').classList.remove('on')};

/* ---------- storage (localStorage w/ memory fallback) ---------- */
const store=(()=>{let mem={};let ok=true;
  try{localStorage.setItem('bcc:test','1');localStorage.removeItem('bcc:test')}catch(e){ok=false}
  return{get k(){return ok},
    read(k,d){try{if(ok){const v=localStorage.getItem(k);return v?JSON.parse(v):d}}catch(e){}return mem[k]??d},
    write(k,v){mem[k]=v;if(ok)try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}};
})();
if(!store.k)toast('Storage unavailable — presets will last this session only');

/* ================================================================
   SCENE
   ================================================================ */
const stage=$('#stage');
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
/* shadows fully disabled — flat presentation everywhere */
stage.appendChild(renderer.domElement);
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(50,1,0.1,200);

const hemi=new THREE.HemisphereLight(0xdfe8ff,0x2a2340,0.48); scene.add(hemi);
const key=new THREE.DirectionalLight(0xfff2e0,0.72);
key.position.set(6,12,7); scene.add(key);
const rim=new THREE.DirectionalLight(0xbcd4ff,0.4); rim.position.set(-7,6,-8); scene.add(rim);
const fill=new THREE.DirectionalLight(0xffffff,0.16); fill.position.set(-4,5,9); scene.add(fill);

/* flat, unlit floor — plain colour, no lighting gradient, no fog */
const floor=new THREE.Mesh(new THREE.CircleGeometry(26,48),
  new THREE.MeshBasicMaterial({color:0x9B2D2D}));
floor.rotation.x=-Math.PI/2; floor.position.y=-0.08; scene.add(floor);

/* ---------- court group: everything rides on this ---------- */
const courtGroup=new THREE.Group(); scene.add(courtGroup);
const annotGroup=new THREE.Group(); courtGroup.add(annotGroup);
/* invisible raycast plane riding the court (colorWrite:false draws nothing at all) */
const rayPlane=new THREE.Mesh(new THREE.PlaneGeometry(46,46),
  new THREE.MeshBasicMaterial({colorWrite:false,depthWrite:false}));
rayPlane.rotation.x=-Math.PI/2; rayPlane.position.y=0.06; courtGroup.add(rayPlane);

/* BWF: 13.4 m long, 6.1 m doubles / 5.18 m singles wide */
const L=13.4, HW=6.1/2, HWS=5.18/2, HL=L/2, LW=0.04;
/* flat, unlit single-colour surface — no shading gradient or texture */
/* fog:false → one perfectly flat colour, no distance tinting;
   lines float 2 cm above the deck so they can never z-fight */
const courtMat=new THREE.MeshBasicMaterial({color:0x2A2F45,fog:false});
const lineMat=new THREE.MeshBasicMaterial({color:0xC8F542,fog:false});
{
  const surf=new THREE.Mesh(new THREE.BoxGeometry(6.1+1.0,0.06,L+1.0),courtMat);
  surf.position.y=0.03; courtGroup.add(surf);   /* deck top at y=0.06, floor at −0.08 */
  const line=(x,z,w,d)=>{const m=new THREE.Mesh(new THREE.BoxGeometry(w,0.012,d),lineMat);
    m.position.set(x,0.075,z);courtGroup.add(m)};
  line(0,-HL,6.1,LW); line(0,HL,6.1,LW);              // baselines
  line(-HW,0,LW,L); line(HW,0,LW,L);                  // doubles sides
  line(-HWS,0,LW,L); line(HWS,0,LW,L);                // singles sides
  line(0,-1.98,6.1,LW); line(0,1.98,6.1,LW);          // short service
  line(0,-(HL-0.76),6.1,LW); line(0,HL-0.76,6.1,LW);  // doubles long service
  const chz=(1.98+HL)/2, chl=HL-1.98;
  line(0,-chz,LW,chl); line(0,chz,LW,chl);            // centre lines
  // net: posts 1.55 m, cord + mesh
  const postG=new THREE.CylinderGeometry(0.03,0.03,1.55,10);
  const postM=new THREE.MeshStandardMaterial({color:0x30344f});
  [-1,1].forEach(s=>{const p=new THREE.Mesh(postG,postM);
    p.position.set(s*(HW+0.05),0.775,0);courtGroup.add(p)});
  const net=new THREE.Mesh(new THREE.PlaneGeometry(6.2,0.76),
    new THREE.MeshStandardMaterial({color:0x11131f,transparent:true,opacity:.42,side:THREE.DoubleSide}));
  net.position.y=1.524-0.38; courtGroup.add(net);
  const band=new THREE.Mesh(new THREE.BoxGeometry(6.2,0.075,0.02),
    new THREE.MeshStandardMaterial({color:0xffffff}));
  band.position.y=1.524; courtGroup.add(band);
}

/* ---------- shuttle (feathered birdie, ~50% bigger) ---------- */
const shuttle=new THREE.Group();
{
  const sgrad=(function(){const d=new Uint8Array([80,150,230,255]);
    const t=new THREE.DataTexture(d,4,1,THREE.LuminanceFormat);
    t.minFilter=t.magFilter=THREE.NearestFilter;t.needsUpdate=true;return t})();
  const toon=(c,o)=>new THREE.MeshToonMaterial({color:c,gradientMap:sgrad,transparent:(o!=null),opacity:(o==null?1:o)});
  const olM=new THREE.MeshBasicMaterial({color:0x2A2233,side:THREE.BackSide});
  const outline=(m,w)=>{const o=new THREE.Mesh(m.geometry,olM);o.scale.setScalar(w||1.08);m.add(o);};
  const cork=new THREE.Mesh(new THREE.SphereGeometry(0.10,20,16),toon(0xFFF6E8));
  cork.scale.set(1,1.12,1); cork.position.y=0.03; outline(cork,1.08); shuttle.add(cork);
  const trim=new THREE.Mesh(new THREE.TorusGeometry(0.098,0.017,10,24),toon(0xE24A4A));
  trim.rotation.x=Math.PI/2; trim.position.y=0.075; shuttle.add(trim);
  const NB=12, feMat=toon(0xFBFCFF);
  for(let i=0;i<NB;i++){
    const piv=new THREE.Group(); piv.rotation.y=i/NB*Math.PI*2;
    const fe=new THREE.Mesh(new THREE.ConeGeometry(0.05,0.36,8),feMat);
    fe.scale.set(1,1,0.42);
    fe.position.set(0.115,0.30,0); fe.rotation.z=-0.42;
    piv.add(fe); shuttle.add(piv);
  }
  shuttle.position.set(0.6,0.16,1.4); shuttle.userData.isShuttle=true;
  courtGroup.add(shuttle);
}

/* ================================================================
   AVATARS
   ================================================================ */
const AVATARS={
  human_m:{label:'Man',icon:'👨',skin:0xE8B98A},
  human_f:{label:'Woman',icon:'👩',skin:0xE8B98A},
  quokka:{label:'Quokka',icon:'🐹',skin:0xC49A6C},
  elephant:{label:'Elephant',icon:'🐘',skin:0x8C8C90},
  dog:{label:'Dog',icon:'🐶',skin:0xE2A85F},
  fennec:{label:'Fennec Fox',icon:'🦊',skin:0xF0D9A8},
  redpanda:{label:'Red Panda',icon:'🐾',skin:0xC96A2E},
  snowleopard:{label:'Snow Leopard',icon:'🐆',skin:0xE4E8F0},
  panda:{label:'Panda',icon:'🐼',skin:0xF4F4F0},
  lemur:{label:'Lemur',icon:'🦝',skin:0x9AA0A8},
  hamster:{label:'Hamster',icon:'🐹',skin:0xE8B770},
};
const TEAM=['#FF5A5A','#3B82F6','#C8F542','#2DD4BF','#A78BFA','#FBBF24'];

const _toonGrad=(function(){const d=new Uint8Array([64,110,165,220]);
  const t=new THREE.DataTexture(d,4,1,THREE.LuminanceFormat);
  t.minFilter=t.magFilter=THREE.NearestFilter;t.needsUpdate=true;return t})();
const _shadowTex=(function(){const c=document.createElement('canvas');c.width=c.height=64;
  const x=c.getContext('2d');const g=x.createRadialGradient(32,32,2,32,32,30);
  g.addColorStop(0,'rgba(20,15,30,0.55)');g.addColorStop(1,'rgba(20,15,30,0)');
  x.fillStyle=g;x.fillRect(0,0,64,64);return new THREE.CanvasTexture(c)})();
function mat(c){return new THREE.MeshToonMaterial({color:c,gradientMap:_toonGrad})}
const PINK=0xFFA9B8, DARK=0x2A2233, CREAM=0xFFF6E8;
const OUTLINE=true, OUTLINE_MIN=0.085, OUTLINE_W=1.07;
const _outlineMat=new THREE.MeshBasicMaterial({color:0x2A2233,side:THREE.BackSide});
function _addOutline(m,r){if(!OUTLINE||r<OUTLINE_MIN)return;
  const o=new THREE.Mesh(m.geometry,_outlineMat);o.scale.setScalar(OUTLINE_W);m.add(o)}
function sph(r,c,x,y,z,sx,sy,sz){
  const m=new THREE.Mesh(new THREE.SphereGeometry(r,24,20),mat(c));
  m.position.set(x,y,z); if(sx)m.scale.set(sx,sy,sz); _addOutline(m,r); return m}
function cone(r,l,c,x,y,z,rx,rz){
  const m=new THREE.Mesh(new THREE.ConeGeometry(r,l,16),mat(c));
  m.position.set(x,y,z); m.rotation.x=rx||0; m.rotation.z=rz||0; _addOutline(m,r); return m}

/* big glossy happy eyes with double sparkle */
function eyes(head,R,spread,ec){
  head.userData.eyes=head.userData.eyes||[];
  [-1,1].forEach(s=>{
    const _eb=sph(0.068,ec,s*spread,0.06,R*0.78,1,1.12,0.8);
    _eb.userData.baseSY=1.12; head.add(_eb); head.userData.eyes.push(_eb);
    head.add(sph(0.026,0xFFFFFF,s*spread+0.026,0.095,R*0.845));
    head.add(sph(0.013,0xFFFFFF,s*spread-0.022,0.035,R*0.85));
    head.add(sph(0.058,PINK,s*(spread+0.10),-0.05,R*0.66,1,0.58,0.42));
  });
}
function grin(head,y,z,r,open){
  const s=new THREE.Mesh(new THREE.TorusGeometry(r,0.017,8,18,Math.PI),mat(DARK));
  s.position.set(0,y,z); s.rotation.z=Math.PI; head.add(s);
  if(open)head.add(sph(r*0.62,0xE2556B,0,y-r*0.55,z-0.01,1,0.75,0.5)); // open-mouth tongue
}

function makeAvatar(type,color){
  const g=new THREE.Group(), a=AVATARS[type], skin=a.skin;
  const isHuman=type.startsWith('human');

  /* ---- body: soft egg in jersey colour, cream belly ---- */
  const body=sph(0.29,color,0,0.43,0,1,1.12,0.94); g.add(body);
  g.userData.jersey=body;
  if(!isHuman)g.add(sph(0.20,CREAM,0,0.40,0.155,1,1.0,0.5)); // belly patch
  /* paws / feet */
  [-1,1].forEach(s=>{
    g.add(sph(0.10,skin,s*0.14,0.075,0.05,1,0.68,1.2));
    if(!isHuman)[-1,0,1].forEach(t=>g.add(sph(0.024,shadeC(skin,0.8),s*0.14+t*0.045,0.075,0.145))); // toes
  });
  /* nub arms */
  [-1,1].forEach(s=>g.add(sph(0.09,skin,s*0.305,0.50,0.05,0.82,1.2,0.82)));

  /* ---- racket, right hand ---- */
  {const rk=new THREE.Group();
   const hnd=new THREE.Mesh(new THREE.CylinderGeometry(0.022,0.026,0.25,10),mat(0x9B5DE5));
   hnd.position.y=0.02; rk.add(hnd);
   rk.add(sph(0.035,0xFFD23F,0,-0.10,0)); // pommel
   const hd=new THREE.Mesh(new THREE.TorusGeometry(0.11,0.024,10,22),mat(0xFF70A6));
   hd.position.y=0.25; rk.add(hd);
   const str=new THREE.Mesh(new THREE.CircleGeometry(0.098,18),
     new THREE.MeshBasicMaterial({color:0xFFFFFF,transparent:true,opacity:0.45,side:THREE.DoubleSide}));
   str.position.y=0.25; rk.add(str);
   rk.position.set(-0.38,0.50,0.16); rk.rotation.set(0.35,0,0.55);
   g.add(rk)}

  /* ---- head ---- */
  const head=new THREE.Group(); head.position.y=1.04; g.add(head);
  const R=0.38;
  let hsx=(type==='quokka'||type==='elephant')?1.08:1.02, hsy=0.92, hsz=0.95;
  if(type==='fennec'){hsx=0.95;hsy=0.9;hsz=1.05;}
  head.add(sph(R,skin,0,0,0,hsx,hsy,hsz));
  const ear=(x,y,r,c,ic,sy)=>{head.add(sph(r,c,x,y,-0.02,1,sy||1,0.75));
    if(ic)head.add(sph(r*0.55,ic,x*0.97,y*0.98,0.06,1,sy||1,0.6))};

  if(type==='human_m'){
    eyes(head,R,0.145,DARK);
    const hair=new THREE.Mesh(new THREE.SphereGeometry(R*1.05,18,14,0,Math.PI*2,0,1.3),mat(0x33261B));
    hair.position.y=0.05; head.add(hair);
    // sporty backwards cap
    const cap=new THREE.Mesh(new THREE.SphereGeometry(R*0.92,18,12,0,Math.PI*2,0,1.15),mat(0x4CC9F0));
    cap.position.set(0,0.13,-0.02); head.add(cap);
    const brim=sph(0.13,0x4CC9F0,0,0.12,-R*0.92,1.4,0.35,1); head.add(brim);
    grin(head,-0.05,R*0.84,0.09,true)}
  if(type==='human_f'){
    eyes(head,R,0.145,DARK);
    const hair=new THREE.Mesh(new THREE.SphereGeometry(R*1.06,18,14,0,Math.PI*2,0,1.5),mat(0x4A2F1B));
    hair.position.y=0.03; head.add(hair);
    head.add(sph(0.13,0x4A2F1B,0,0.20,-R*0.85));          // bun
    head.add(sph(0.055,0xFF6B9D,0.13,0.30,-R*0.55));      // bow
    grin(head,-0.05,R*0.84,0.09,true)}

  if(type==='quokka'){ /* the smiley one */
    eyes(head,R,0.15,DARK);
    ear(-0.24,0.30,0.105,skin,0xE8CBA8);ear(0.24,0.30,0.105,skin,0xE8CBA8);
    head.add(sph(0.17,0xE8CBA8,0,-0.115,R*0.72,1.2,0.82,0.7));
    head.add(sph(0.045,0x4A3226,0,-0.02,R*1.0,1.25,0.85,0.8));
    grin(head,-0.10,R*0.95,0.115,true);
    [-1,1].forEach(s=>head.add(sph(0.024,0xFFFFFF,s*0.028,-0.20,R*0.96,1,1.4,0.5)));
    g.add(sph(0.06,skin,0.10,0.30,-0.27))}                 // little tail
  if(type==='elephant'){
    eyes(head,R,0.15,DARK);
    [-1,1].forEach(s=>{
      const e=sph(0.25,skin,s*0.42,0.05,-0.04,0.5,1.3,0.95); e.rotation.y=s*0.35; head.add(e);
      const i=sph(0.17,0xE3C2CE,s*0.44,0.05,0.01,0.4,1.15,0.8); i.rotation.y=s*0.35; head.add(i)});
    head.add(sph(0.075,skin,0,-0.13,R*0.86));              // curling trunk
    head.add(sph(0.063,skin,0,-0.245,R*0.99));
    head.add(sph(0.055,skin,0,-0.315,R*1.14));
    head.add(sph(0.028,shadeC(skin,0.75),0,-0.315,R*1.20));// trunk tip
    [-1,1].forEach(s=>head.add(cone(0.028,0.10,0xFFF6E0,s*0.115,-0.16,R*0.80,2.6)));
    grin(head,-0.06,R*0.90,0.055)}
  if(type==='dog'){ /* golden pup */
    eyes(head,R,0.145,DARK);
    [-1,1].forEach(s=>{const e=sph(0.135,0xB07B3E,s*0.315,0.085,0,0.55,1.45,0.75);
      e.rotation.z=s*0.65; head.add(e)});
    head.add(sph(0.165,CREAM,0,-0.115,R*0.72,1.15,0.82,0.72));
    head.add(sph(0.055,0x4A3226,0,-0.025,R*1.0,1.3,0.9,0.8));
    grin(head,-0.115,R*0.94,0.095);
    head.add(sph(0.05,0xFF8FA3,0.03,-0.215,R*0.90,1,1.45,0.5)); // tongue

function strokeMesh(data){
  const pts=data.points.map(p=>new THREE.Vector3(p[0],0.10,p[1]));
  if(pts.length<2)return null;
  const curve=new THREE.CatmullRomCurve3(pts);
  const g=new THREE.Group();
  const tube=new THREE.Mesh(new THREE.TubeGeometry(curve,Math.min(120,pts.length*4),data.width,6,false),
    new THREE.MeshBasicMaterial({color:data.color}));
  g.add(tube);
  if(data.type==='arrow'){
    const a=pts[pts.length-2],b=pts[pts.length-1];
    const dir=new THREE.Vector3().subVectors(b,a).normalize();
    const cone=new THREE.Mesh(new THREE.ConeGeometry(data.width*3.4,data.width*8,10),
      new THREE.MeshBasicMaterial({color:data.color}));
    cone.position.copy(b);
    cone.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),dir);
    g.add(cone);
  }
  annotGroup.add(g); return g;
}
function addStroke(data,silentUndo){

let curCourt='#90B489', curEnv='#9B2D2D';
function lum(hex){const n=parseInt(hex.slice(1),16);
  const f=v=>{v/=255;return v<=.03928?v/12.92:Math.pow((v+.055)/1.055,2.4)};
  return .2126*f(n>>16&255)+.7152*f(n>>8&255)+.0722*f(n&255)}
function shade(hex,f){const n=parseInt(hex.slice(1),16);
  const c=v=>Math.max(0,Math.min(255,Math.round(v*f)));
  return (c(n>>16&255)<<16|c(n>>8&255)<<8|c(n&255))}
function applyCourt(hex){curCourt=hex;
  courtMat.color.set(hex);
  lineMat.color.set(0xFFFFFF);   // lines are always white

/* ================================================================
   CAMERA — custom orbit + auto-framing
   ================================================================ */
const cam={theta:0,phi:1.02,radius:16,target:new THREE.Vector3(0,0.4,0)};
function defaultCam(){
  const portrait=innerHeight>innerWidth;
  cam.theta=0; cam.phi=portrait?0.92:1.02; autoFrame();
}
function updateCamera(){
  cam.phi=Math.max(0.18,Math.min(1.5,cam.phi));
  cam.radius=Math.max(4,Math.min(45,cam.radius));
  const sp=Math.sin(cam.phi),x=cam.radius*sp*Math.sin(cam.theta),
        z=cam.radius*sp*Math.cos(cam.theta),y=cam.radius*Math.cos(cam.phi);
  camera.position.set(cam.target.x+x,cam.target.y+y,cam.target.z+z);
  camera.lookAt(cam.target);
}
function autoFrame(){
  // iterative bounding-box projection: fit court corners with margin
  const m=0.8, cs=[];
  for(const sx of[-1,1])for(const sz of[-1,1])
    cs.push(new THREE.Vector3(sx*(HW+m),0,sz*(HL+m)),new THREE.Vector3(sx*(HW+m),1.6,sz*(HL+m)));
  for(let i=0;i<24;i++){
    updateCamera(); camera.updateMatrixWorld();
    let mx=0;
    for(const c of cs){
      const w=c.clone().applyMatrix4(courtGroup.matrixWorld);
      const p=w.project(camera);
      mx=Math.max(mx,Math.abs(p.x),Math.abs(p.y));
    }
    if(mx<0.95&&mx>0.88)break;
    cam.radius*=mx/0.9;
  }
  updateCamera();
}

/* ================================================================
   INTERACTION STATE MACHINE
   ================================================================ */
const ray=new THREE.Raycaster(), ndc=new THREE.Vector2();
const pointers=new Map();
let mode='idle';           // idle|orbit|dragPlayer|dragShuttle|dragPin|stroke|pinch
let dragRec=null, strokePts=null, strokeLive=null, downPt=null, pinchD=0;
let courtLocked=false, lastTap={t:0,pl:null};

function setNDC(e){const r=renderer.domElement.getBoundingClientRect();
  ndc.x=((e.clientX-r.left)/r.width)*2-1; ndc.y=-((e.clientY-r.top)/r.height)*2+1;
  ray.setFromCamera(ndc,camera)}
function floorHit(){const hit=ray.intersectObject(rayPlane);
  return hit.length?hit[0].point:null}
function toLocal(v){return courtGroup.worldToLocal(v.clone())}
function pickPlayer(){
  const hits=ray.intersectObjects(players.map(p=>p.group),true);
  if(!hits.length)return null;
  let o=hits[0].object;while(o&&!o.userData.player)o=o.parent;
  return players.find(p=>p.group===o)||null;
}
function pickShuttle(){return ray.intersectObject(shuttle,true).length>0}
function pickAnnot(){
  const hits=ray.intersectObjects(annotGroup.children,true);
  if(!hits.length)return null;
  let o=hits[0].object;while(o&&o.parent!==annotGroup)o=o.parent;
  return o;
}

stage.addEventListener('contextmenu',e=>e.preventDefault());
stage.addEventListener('pointerdown',e=>{
  stage.setPointerCapture(e.pointerId);
  pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(pointers.size===2){ // pinch zoom
    const[a,b]=[...pointers.values()];
    pinchD=Math.hypot(a.x-b.x,a.y-b.y); mode='pinch';
    strokePts=null; if(strokeLive){annotGroup.remove(strokeLive);strokeLive=null}
    return;
  }
  setNDC(e); downPt={x:e.clientX,y:e.clientY};
  if(drawTool&&e.button===2){mode='orbit';return}   // right button still rotates while drawing
  if(drawTool==='arrow'||drawTool==='line'){
    const h=floorHit(); if(!h)return;
    const l=toLocal(h); strokePts=[[l.x,l.z]]; mode='stroke'; return;
  }
  if(drawTool==='pin'){
    const h=floorHit(); if(!h)return;
    const l=toLocal(h); openNoteEditor(null,[l.x,l.z]); return;
  }
  if(drawTool==='erase'){
    const g=pickAnnot();
    if(g){
      const s=strokes.find(s=>s.mesh===g), p=pins.find(p=>p.group===g);
      if(s){const d={...s};removeStroke(s);pushUndo(()=>addStroke(d,true));toast('Stroke erased')}
      if(p){const d={pos:p.pos,text:p.text};removePin(p);pushUndo(()=>addPin(d.pos,d.text,true));toast('Pin erased')}
    }
    return;
  }
  const pl=pickPlayer();
  if(pl){mode='dragPlayer';dragRec=pl;stage.className='cursor-grabbing';return}
  if(pickShuttle()){mode='dragShuttle';stage.className='cursor-grabbing';return}
  const pin=pickAnnot();
  if(pin&&pin.userData.pin&&e.button!==2){
    dragRec=pins.find(p=>p.group===pin);
    if(dragRec){mode='dragPin';stage.className='cursor-grabbing';return}
  }
  mode='orbit';
});

stage.addEventListener('pointermove',e=>{
  const prev=pointers.get(e.pointerId);
  if(prev)pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
  // hover cursor (mouse, no buttons)
  if(e.pointerType==='mouse'&&!e.buttons&&mode==='idle'){
    setNDC(e);
    if(drawTool){stage.className='cursor-draw'}
    else{const a=pickAnnot();stage.className=(pickPlayer()||pickShuttle()||(a&&a.userData.pin))?'cursor-hand':''}
    return;
  }
  if(!prev)return;
  const dx=e.clientX-prev.x, dy=e.clientY-prev.y;
  if(mode==='pinch'&&pointers.size===2){
    const[a,b]=[...pointers.values()];
    const d=Math.hypot(a.x-b.x,a.y-b.y);
    if(pinchD)cam.radius*=pinchD/d;
    pinchD=d; updateCamera(); return;
  }
  setNDC(e);
  if(mode==='stroke'&&strokePts){
    const h=floorHit(); if(!h)return;
    const l=toLocal(h), last=strokePts[strokePts.length-1];
    if(Math.hypot(l.x-last[0],l.z-last[1])>0.07){
      strokePts.push([l.x,l.z]);
      if(strokeLive){annotGroup.remove(strokeLive);strokeLive.geometry.dispose()}
      if(strokePts.length>1){
        const curve=new THREE.CatmullRomCurve3(
          strokePts.map(p=>new THREE.Vector3(p[0],0.10,p[1])));
        strokeLive=new THREE.Mesh(
          new THREE.TubeGeometry(curve,Math.min(120,strokePts.length*4),strokeWidth,6,false),
          new THREE.MeshBasicMaterial({color:strokeColor}));
        annotGroup.add(strokeLive);
      }
    }
    return;
  }
  if(mode==='dragPin'&&dragRec){
    const h2=floorHit(); if(!h2)return;
    const l=toLocal(h2);
    dragRec.group.position.set(l.x,0.06,l.z); dragRec.pos=[l.x,l.z];
    return;
  }
  if(mode==='dragPlayer'||mode==='dragShuttle'){
    const h=floorHit(); if(!h)return;
    const l=toLocal(h);
    l.x=Math.max(-9,Math.min(9,l.x)); l.z=Math.max(-10,Math.min(10,l.z));
    const obj=mode==='dragPlayer'?dragRec.group:shuttle;
    obj.position.x=l.x; obj.position.z=l.z;
    if(mode==='dragPlayer')faceOpponents(obj);
    return;
  }
  if(mode==='orbit'){if(courtLocked)return;cam.theta-=dx*0.0055;cam.phi-=dy*0.0055;updateCamera()}
});

function endPointer(e){
  pointers.delete(e.pointerId);
  if(mode==='stroke'&&strokePts){
    if(strokeLive){annotGroup.remove(strokeLive);strokeLive=null}
    if(strokePts.length>1)
      addStroke({type:drawTool,color:strokeColor,width:strokeWidth,points:strokePts});
    strokePts=null;
  }
  if(mode==='dragPin'&&dragRec){
    if(downPt&&Math.hypot(e.clientX-downPt.x,e.clientY-downPt.y)<6)openNoteEditor(dragRec);
  }
  else if(mode==='dragPlayer'||mode==='dragShuttle'||mode==='orbit'){
    if(downPt&&Math.hypot(e.clientX-downPt.x,e.clientY-downPt.y)<6&&!drawTool){
      setNDC(e); const pl=pickPlayer();
      select(pl||null);
      // double-tap / double-click a player → open the Players panel
      const now=performance.now();
      if(pl&&lastTap.pl===pl&&now-lastTap.t<380){openPane('players');lastTap={t:0,pl:null}}
      else lastTap={t:now,pl};
    }
  }
  mode=pointers.size?mode:'idle'; dragRec=null; downPt=null;
  stage.className=drawTool?'cursor-draw':'';
}
stage.addEventListener('pointerup',endPointer);
stage.addEventListener('pointercancel',endPointer);
stage.addEventListener('wheel',e=>{e.preventDefault();
  cam.radius*=1+Math.sign(e.deltaY)*0.09;updateCamera()},{passive:false});

/* ---------- selection ---------- */

}

/* players pane */
function syncPlayersUI(){
  $('#cap').textContent=`${players.length}/6`;
  const add=$('#btnAdd');
  add.disabled=players.length>=6;
  add.innerHTML=players.length>=6?'6/6 — court full'
    :`＋ Add player <span id="cap" class="sg">${players.length}/6</span>`;
  const list=$('#plist'); list.innerHTML='';
  players.slice().sort((a,b)=>a.id-b.id).forEach(p=>{
    const d=document.createElement('div');
    d.className='pcard'+(selected===p?' sel':'');
    d.innerHTML=`<div class="num" style="background:${p.color}">${p.id}</div>
      <button class="av" title="Choose character" aria-label="Choose character for ${p.name}">${AVATARS[p.type].icon}</button>
      <div class="nm" title="Tap to rename">${p.name}</div>
      <input type="color" value="${p.color}" aria-label="Colour for ${p.name}">
      <button class="del" aria-label="Remove ${p.name}">✕</button>`;
    d.querySelector('.av').onclick=()=>openAvPick(p);
    d.querySelector('input').oninput=e=>recolor(p,e.target.value);
    d.querySelector('.del').onclick=()=>removePlayer(p);
    d.querySelector('.num').onclick=()=>select(p);
    const nm=d.querySelector('.nm');
    nm.onclick=()=>{                       // tap name → rename in place
      const inp=document.createElement('input');
      inp.type='text'; inp.value=p.name; inp.maxLength=18; inp.className='nmedit';
      nm.replaceWith(inp); inp.focus(); inp.select();
      const done=()=>{const v=inp.value.trim(); if(v){p.name=v;p.custom=true;}
        refreshLabel(p); syncPlayersUI();
        live(`renamed to ${p.name}`)};
      inp.onblur=done;
      inp.onkeydown=ev=>{if(ev.key==='Enter')inp.blur();
        if(ev.key==='Escape'){inp.value=p.name;inp.blur()}};
    };
    list.appendChild(d);
  });
}

{

/* note editor */
let neTarget=null, nePos=null;
function openNoteEditor(rec,pos){

function syncPins(){
  const host=$('#pinList');host.innerHTML='';
  if(!pins.length){host.innerHTML='<div class="empty">No pins yet — use the Note pin tool in Draw.</div>';return}
  pins.forEach(p=>{const d=document.createElement('button');d.className='preset';
    d.innerHTML=`<div class="info"><b>📍 ${p.text}</b></div><span class="mini">✕</span>`;

/* ================================================================
   PRESETS
   ================================================================ */
function serialize(name){
  return{schema:'bcc-preset-v1',name,createdAt:new Date().toISOString(),
    app:'Binh Coaching Corner',
    players:players.map(p=>({id:p.id,avatar:p.type,color:p.color,name:p.name,
      pos:[+p.group.position.x.toFixed(3),0,+p.group.position.z.toFixed(3)]})),
    shuttle:{pos:[+shuttle.position.x.toFixed(3),+shuttle.position.y.toFixed(3),+shuttle.position.z.toFixed(3)]},
    annotations:{
      strokes:strokes.map(s=>({type:s.type,color:s.color,width:s.width,
        points:s.points.map(p=>[+p[0].toFixed(3),+p[1].toFixed(3)])})),
      pins:pins.map(p=>({pos:[+p.pos[0].toFixed(3),+p.pos[1].toFixed(3)],text:p.text}))},
    notes:$('#setupNotes').value,
    appearance:{court:curCourt,environment:curEnv}};
}
function clearScene(){
  [...players].forEach(p=>removePlayer(p,true));
  [...strokes].forEach(removeStroke); [...pins].forEach(removePin);
  select(null); undoStack=[];
}
function restore(d){
  clearScene();
  (d.players||[]).forEach(p=>addPlayer(p.avatar,p.color,[p.pos[0],p.pos[2]],p.id,p.name));
  (d.annotations?.strokes||[]).forEach(s=>addStroke({...s},true));
  (d.annotations?.pins||[]).forEach(p=>addPin(p.pos,p.text,true));
  if(d.shuttle)shuttle.position.set(...d.shuttle.pos);
  $('#setupNotes').value=d.notes||'';
  if(d.appearance){
    const LC={'tournament-green':'#1B5E43','championship-blue':'#1E4FA3','coral-clay':'#C4574E','slate-night':'#2A2F45'};
    const LE={'arena-dark':'#1a1d3a','studio-white':'#d6d9e2','sunset':'#3a2450','forest':'#16301f'};
    const c=d.appearance.court,e=d.appearance.environment;
    applyCourt(c&&c[0]==='#'?c:(LC[c]||'#90B489'));
    applyEnv(e&&e[0]==='#'?e:(LE[e]||'#9B2D2D'));}
  toast(`"${d.name}" loaded`);
}
function savePreset(){
  const def='Setup — '+new Date().toLocaleDateString(undefined,{day:'numeric',month:'short'})
    +' '+new Date().toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});
  $('#svName').value=def;
  popShow($('#savepop'));
  $('#svName').focus(); $('#svName').select();
}
$('#svX').onclick=popHide;
$('#svGo').onclick=()=>{
  const name=$('#svName').value.trim()||'My setup';
  const list=store.read('bcc:presets',[]);
  list.unshift(serialize(name));
  store.write('bcc:presets',list); renderPresets(); popHide();
  toast('“'+name+'” saved ⭐');
};
$('#svName')&&($('#svName').onkeydown=e=>{if(e.key==='Enter')$('#svGo').click()});
function renderPresets(){
  const list=store.read('bcc:presets',[]), host=$('#presetList');
  host.innerHTML='';
  if(!list.length){host.innerHTML='<div class="empty">No presets yet. Set up the court, then save.</div>';return}
  list.forEach((d,i)=>{
    const el=document.createElement('div');el.className='preset';el.setAttribute('role','button');el.tabIndex=0;
    const when=new Date(d.createdAt).toLocaleDateString(undefined,{day:'numeric',month:'short'});
    el.innerHTML=`<div class="info"><b>${d.name}</b><span>${when}</span></div>
      <span class="chip">${d.players.length}P</span>
      <button class="mini" data-a="x" aria-label="Delete preset">✕</button>
      <button class="mini" data-a="dl" aria-label="Export preset">⬇</button>`;
    el.onclick=e=>{
      const a=e.target.dataset?.a;
      if(a==='x'){list.splice(i,1);store.write('bcc:presets',list);renderPresets();toast('Preset deleted');return}
      if(a==='dl'){const blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
        const u=URL.createObjectURL(blob),link=document.createElement('a');
        link.href=u;link.download=d.name.replace(/[^\w-]+/g,'-')+'.json';link.click();
        URL.revokeObjectURL(u);return}
      restore(d); if(innerWidth<900)sheetOpen(false);
    };
    el.onkeydown=e=>{if(e.key==='Enter')restore(d)};
    host.appendChild(el);
  });
}
$('#btnSave').onclick=savePreset; $('#btnSave2').onclick=savePreset;
$('#btnImport').onclick=()=>$('#fileImport').click();
$('#fileImport').onchange=e=>{
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{try{
    const d=JSON.parse(r.result);
    if(d.schema!=='bcc-preset-v1')throw 0;
    const list=store.read('bcc:presets',[]);
    list.unshift(d);store.write('bcc:presets',list);renderPresets();
    toast(`"${d.name}" imported`);
  }catch(err){toast('Not a valid Binh Coaching Corner preset')}};
  r.readAsText(f); e.target.value='';
};

/* ================================================================
   KEYBOARD
   ================================================================ */
addEventListener('keydown',e=>{
  const typing=/INPUT|TEXTAREA/.test(document.activeElement?.tagName);
  if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!typing){e.preventDefault();doUndo();return}
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();savePreset();return}
  if(typing)return;
  if(e.key==='Escape'){
    if(drawTool){$('#dpExit').click();return}
    if(selected){select(null);return}
    popHide(); sheetOpen(false); return;
  }
  if(e.key==='Tab'&&players.length){e.preventDefault();
    const sorted=players.slice().sort((a,b)=>a.id-b.id);
    const i=selected?sorted.indexOf(selected):-1;
    select(sorted[(i+1)%sorted.length]); return}
  if(e.key.startsWith('Arrow')&&selected){e.preventDefault();
    const step=e.shiftKey?0.5:0.1, g=selected.group.position;
    if(e.key==='ArrowUp')g.z-=step; if(e.key==='ArrowDown')g.z+=step;
    if(e.key==='ArrowLeft')g.x-=step; if(e.key==='ArrowRight')g.x+=step;
    faceOpponents(selected.group); return}
  if(e.key==='r'||e.key==='R'){$$('#tools .tool')[0].click()}
  if(['1','2','3','4'].includes(e.key)){$$('#tools .tool')[+e.key-1].click()}
});

  $('#lockIco').innerHTML=courtLocked
    ?'<rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/>'
    :'<rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0"/>';
  toast(courtLocked?'Court locked — rotation off':'Court unlocked');
};

applyCourt('#90B489'); applyEnv('#9B2D2D');
/* default: doubles setup — red pair vs blue pair, facing each other */
const RED='#FF5A5A', BLUE='#3B82F6';
addPlayer('quokka',RED,[-1.5,-3.3]); addPlayer('elephant',RED,[1.5,-3.3]);
addPlayer('lemur',BLUE,[-1.5,3.3]); addPlayer('panda',BLUE,[1.5,3.3]);
renderPresets(); syncPins(); resize();

(function loop(){
  requestAnimationFrame(loop);
  const t=performance.now()/1000;
  for(const p of players){
    const g=p.group;
    if(mode==='dragPlayer'&&dragRec===p){g.position.y=0.14;g.scale.set(0.97,1.06,0.97)}
    else{
      if(g.userData.phase===undefined)g.userData.phase=Math.random()*6.283;
      const ph=g.userData.phase;
      g.position.y=0.06+Math.sin(t*1.8+ph)*0.012;
      g.scale.set(1,1+Math.sin(t*1.8+ph)*0.02,1); g.rotation.z=0;
    }
    const eyes=g.userData.eyes;
    if(eyes&&eyes.length){
      if(g.userData.blinkPhase===undefined)g.userData.blinkPhase=Math.random()*8;
      const bl=((t+g.userData.blinkPhase)%4.2)>4.0?0.12:1;
      for(const e of eyes)e.scale.y=(e.userData.baseSY||1.12)*bl;
    }
  }
  updateCamera(); renderer.render(scene,camera);
})();
